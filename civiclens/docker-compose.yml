version: "3.9"

services:
  backend:
    build: ./backend
    container_name: nagrik360-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    networks:
      - nagrik360net

  frontend:
    image: nginx:alpine
    container_name: nagrik360-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - nagrik360net

networks:
  nagrik360net:
    driver: bridge

volumes:
  backend_uploads:
  backend_data:
