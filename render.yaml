# ============================================================
#  render.yaml — Nagrik360 Blueprint for Render.com
#
#  Deploys the backend API + Postgres database in one click.
#
#  HOW TO USE:
#    1. Push your project to GitHub.
#    2. Go to https://dashboard.render.com → New → Blueprint.
#    3. Connect your GitHub repo — Render reads this file automatically.
#    4. Fill in the env vars marked "sync: false" when prompted.
#    5. Click Deploy.
# ============================================================

services:
  - type: web
    name: nagrik360-backend
    runtime: node
    rootDir: civiclens/backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      # ---- Server ----
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"

      # ---- CORS ----
      # Set this to your Vercel frontend URL after deploying the frontend.
      # Example: https://nagrik360.vercel.app
      - key: CLIENT_URL
        sync: false

      # ---- Database ----
      # Render auto-fills DATABASE_URL from the Postgres instance below.
      - key: DATABASE_URL
        fromDatabase:
          name: nagrik360-db
          property: connectionString
      - key: PGSSL
        value: "true"

      # ---- Auth ----
      # Render auto-generates a secure random JWT_SECRET for you.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"

      # ---- Groq AI ----
      # Get free key from https://console.groq.com/keys
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # ---- Cloudinary (photo storage) ----
      # Sign up free at https://cloudinary.com/users/register_free
      # All three values are on your Cloudinary dashboard home page.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "8"

      # ---- Email (SMTP) — optional ----
      # Without SMTP, "Send to government" runs in simulated mode (still works, just logs).
      - key: GOV_REPORT_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ---- Rate Limiting ----
      - key: RATE_LIMIT_WINDOW_MIN
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

# ---- Postgres database (free tier — 1 GB, auto-provisioned by Render) ----
databases:
  - name: nagrik360-db
    plan: free
    databaseName: nagrik360
    user: nagrik360
